<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Salary Guide — TalentBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="salary.css">
</head>
<body>
  <div class="topbar">
    <span>TalentBridge Salary Insights</span>
    <div class="topbar-links">
      <a href="login.html">Employer Login</a>
    </div>
  </div>
  <nav>
    <div class="logo"><div class="logo-icon"></div><span class="logo-text">Talent<span>Bridge</span></span></div>
    <div class="nav-menu">
      <a href="index.html">Jobs</a>
      <a href="salary.html" class="active">Salary Guide</a>
      <a href="resume.html">Resume Builder</a>
    </div>
    <div class="nav-actions"><a class="btn-ghost" href="login.html">Sign In</a></div>
  </nav>

  <section class="section">
    <div class="wrapper">
      <div class="section-head">
        <div>
          <div class="section-label">Compensation</div>
          <div class="section-title">Salary Guide</div>
        </div>
        <div>
          <div style="font-size:0.9rem;color:var(--gray-400)">Lookup by role & location — data is sample/demo only.</div>
        </div>
      </div>

      <div class="salary-controls" style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap">
        <select id="roleSelect" style="min-width:220px;padding:0.5rem;border-radius:8px;border:1px solid var(--gray-200)"></select>
        <input id="locInput" placeholder="City or Remote" style="padding:0.55rem;border-radius:8px;border:1px solid var(--gray-200)" />
        <button id="runLookup" class="btn">Lookup</button>
        <button id="exportSalary" class="btn-ghost">Export CSV</button>
      </div>

      <div id="salarySummary" style="margin-bottom:1rem"></div>

      <div id="salaryTableWrap" style="overflow:auto">
        <table id="salaryTable" style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="text-align:left;border-bottom:1px solid var(--gray-200)"><th>Role</th><th>Company</th><th>Location</th><th>Median</th><th>Range</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>

  <footer>
    <span>© 2026 TalentBridge Pvt. Ltd.</span>
  </footer>

  <script src="salary.js"></script>
</body>
</html>
